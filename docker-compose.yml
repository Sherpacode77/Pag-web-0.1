version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Node environment
      NODE_ENV: production
      
      # Admin credentials (CHANGE THESE IN PRODUCTION!)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-please-replace-with-a-long-random-secret-at-least-32-characters}
    
    volumes:
      # Persistencia para products.json
      - products_data:/app/lib
      # Persistencia para uploads (imágenes y videos)
      - uploads_data:/app/public/uploads
    
    restart: unless-stopped
    
    # Limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

volumes:
  # Volume para datos de productos
  products_data:
    driver: local
  
  # Volume para uploads
  uploads_data:
    driver: local
