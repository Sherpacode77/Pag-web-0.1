version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

      # Admin credentials
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-please-replace-with-a-long-random-secret-at-least-32-characters}

      # Base de datos MySQL/MariaDB
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-false}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-10000}
      DB_PRODUCTS_ENABLED: ${DB_PRODUCTS_ENABLED:-true}
      DB_ASSET_STORAGE_ENABLED: ${DB_ASSET_STORAGE_ENABLED:-false}

      # URLs del sitio
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://cerounobikes.com}
      SITE_URL: ${SITE_URL:-https://cerounobikes.com}

      # MercadoPago
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}

      # Analytics (opcionales)
      NEXT_PUBLIC_FACEBOOK_PIXEL_ID: ${NEXT_PUBLIC_FACEBOOK_PIXEL_ID}
      FACEBOOK_PIXEL_ID: ${FACEBOOK_PIXEL_ID}
      FACEBOOK_ACCESS_TOKEN: ${FACEBOOK_ACCESS_TOKEN}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID}
      NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${NEXT_PUBLIC_GA4_MEASUREMENT_ID}
      NEXT_PUBLIC_GOOGLE_ADS_ID: ${NEXT_PUBLIC_GOOGLE_ADS_ID}

    volumes:
      # Persistencia para imágenes y videos subidos
      - uploads_images:/app/public/images/products
      - uploads_videos:/app/public/videos/products

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

volumes:
  uploads_images:
    driver: local
  uploads_videos:
    driver: local
